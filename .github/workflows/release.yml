name: ساخت و انتشار (Build & Release)

# با push کردن یک تگ نسخه (مثل v1.1.0) اجرا می‌شود و خروجی‌های ویندوز و لینوکس را
# می‌سازد و در بخش Releases گیت‌هاب بارگذاری می‌کند.
# همچنین می‌توان به‌صورت دستی (workflow_dispatch) برای یک تگ دلخواه اجرا کرد.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'تگ نسخه برای ساخت (مثلاً v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ساخت (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            asset: hyper_samen_one-windows
          - os: ubuntu-latest
            label: linux
            asset: hyper_samen_one-linux
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: نصب کتابخانه‌های سیستمی Qt (لینوکس)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: نصب وابستگی‌ها
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ساخت فایل اجرایی
        run: python tools/build_exe.py

      - name: تعیین شمارهٔ نسخه
        id: ver
        shell: bash
        run: echo "version=$(python -c 'from app.__version__ import __version__; print(__version__)')" >> "$GITHUB_OUTPUT"

      - name: بسته‌بندی (ویندوز)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/hyper_samen_one -DestinationPath "${{ matrix.asset }}-${{ steps.ver.outputs.version }}.zip"

      - name: بسته‌بندی (لینوکس)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.asset }}-${{ steps.ver.outputs.version }}.tar.gz" -C dist hyper_samen_one

      - name: بارگذاری Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            *.zip
            *.tar.gz
          if-no-files-found: ignore

  release:
    name: انتشار در گیت‌هاب
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: دریافت همهٔ خروجی‌ها
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: ساخت Release و بارگذاری فایل‌ها
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: هایپرمارکت ثامن ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
