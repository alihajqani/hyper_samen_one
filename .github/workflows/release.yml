name: Build & Release

# Triggered by pushing a version tag (e.g. v1.1.1) or manually via workflow_dispatch.
# Builds Windows (.zip) and Linux Ubuntu (.tar.gz) executables and uploads them to
# GitHub Releases using the built-in GITHUB_TOKEN — no extra secrets required.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g. v1.1.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            asset: hyper_samen_one-windows
          - os: ubuntu-latest
            label: linux
            asset: hyper_samen_one-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build executable
        run: python tools/build_exe.py

      - name: Get version number
        id: ver
        shell: bash
        run: echo "version=$(python -c 'from app.__version__ import __version__; print(__version__)')" >> "$GITHUB_OUTPUT"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/hyper_samen_one -DestinationPath "${{ matrix.asset }}-${{ steps.ver.outputs.version }}.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.asset }}-${{ steps.ver.outputs.version }}.tar.gz" -C dist hyper_samen_one

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            *.zip
            *.tar.gz
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Hyper Market Samen ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
